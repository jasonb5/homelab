repositories:
- name: longhorn
  url: https://charts.longhorn.io
- name: traefik
  url: https://helm.traefik.io/traefik

releases:
  - name: longhorn
    namespace: longhorn-system
    createNamespace: true
    chart: longhorn/longhorn
    version: 1.3.2
    values:
      - persistence:
          defaultClassReplicaCount: 2
    wait: true
  - name: traefik
    namespace: default
    chart: traefik/traefik
    version: 18.0.0
    values:
      - values/traefik.yaml
      - common-utils:
          type: null
          extraObjects:
            - apiVersion: traefik.containo.us/v1alpha1
              kind: IngressRoute
              metadata:
                name: longhorn
                namespace: longhorn-system
              spec:
                entryPoints:
                  - websecure
                routes:
                - kind: Rule
                  match: Host(`longhorn.angrydonkey.io`)
                  services:
                  - kind: Service
                    name: longhorn-frontend
                    namespace: longhorn-system
                    port: 80
    disableValidationOnInstall: true
    dependencies:
      - chart: ../charts/common-utils
        version: 0.1.0
    needs:
    - longhorn-system/longhorn
