repositories:
- name: jupyterhub
  url: https://jupyterhub.github.io/helm-chart

releases:
  - name: minecraft-ntc2
    namespace: default
    chart: ../charts/minecraft
    version: 0.1.0
    values:
      - values/common.yaml
      - values/minecraft-ntc2.yaml
  - name: dashy
    namespace: default
    chart: ../charts/dashy
    version: 0.1.0
    values:
      - values/common.yaml
      - values/dashy.yaml
  - name: jupyterhub
    namespace: default
    chart: jupyterhub/jupyterhub
    version: 2.0.0
    values:
      - values/jupyterhub.yaml
  - name: jupyterhub-extra
    namespace: default
    chart: ../charts/common-utils
    version: 0.1.0
    values:
      - values/jupyterhub-extra.yaml
    needs:
      - default/jupyterhub
  - name: jellyfin
    namespace: default
    chart: ../charts/jellyfin
    version: 0.1.0
    values:
      - values/common.yaml
      - values/jellyfin.yaml
  - name: vaultwarden
    namespace: default
    chart: ../charts/vaultwarden
    version: 0.1.0
    values:
      - values/common.yaml
      - values/vaultwarden.yaml
  - name: gotify
    namespace: default
    chart: ../charts/gotify
    version: 0.1.0
    values:
      - values/common.yaml
      - values/gotify.yaml

# these are processed before releases in this state file
# ensuring longhorn CRDs are available
helmfiles:
- path: prereqs.yaml
