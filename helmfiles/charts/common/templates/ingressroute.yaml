{{- range $key, $value := .Values.ingressRoutes }}
{{- $type := default "http" $value.type }}
{{- if eq $type "http" }}
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $key }}
  namespace: {{ $.Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: Host(`{{ $key }}.angrydonkey.io`)
    services:
    - kind: Service
      name: {{ default $key $value.service }}
      namespace: {{ $value.namespace }}
      port: {{ $value.port }}
{{- else if eq $type "tcp" }}
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ $key }}
  namespace: {{ $.Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
  - match: HostSNI(`*`)
    services:
    - name: {{ default $key $value.service }}
      port: {{ $value.port }}
{{- end }}
{{- end }}
