templates:
  - extraobjects.yaml
tests:
  - it: should template extra object from string
    set:
      extraObjects:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: tests
          data:
            CONFIG_FILE: /data
    asserts:
      - matchSnapshot: {}
  - it: should template extra object from yaml
    set:
      extraObjects:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: tests
          data:
            CONFIG_FILE: /data
    asserts:
      - matchSnapshot: {}
