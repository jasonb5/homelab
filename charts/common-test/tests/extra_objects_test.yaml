templates:
  - app.yaml
tests:
  - it: should match snapshot
    set:
      extraObjects:
        - |
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: {{ include "common.name" . }}
            namespace: {{ .Release.Namespace }}
          spec:
            policyTypes:
              - Ingress
              - Egress
    asserts:
      - matchSnapshot: {}
