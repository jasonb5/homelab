templates:
  - app.yaml
tests:
  - it: should set volumeMounts
    set:
      persistence:
        config:
          type: configMap
          mountPath: /config
          readOnly: true
          subPath: production
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /config
            name: config
            readOnly: true
            subPath: production
  - it: should set securityContext
    set:
      securityContext:
        fsGroup: 101
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext
          value:
            fsGroup: 101
  - it: should set resources
    set:
      resources:
        limits:
          cpu: 2
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 2
  - it: should set readinessProbe
    set:
      readinessProbe:
        exec:
          - /bin/exit
          - 1
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe
          value:
            exec:
              - /bin/exit
              - 1
  - it: should set ports
    set:
      services:
        http:
          port: 80
          hostPort: 80
          protocol: TCP
    documentIndex: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 80
            hostPort: 80
            name: http
            protocol: TCP
  - it: should set livenessProbe
    set:
      livenessProbe:
        exec: ["/bin/exit", "1"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe
          value:
            exec: ["/bin/exit", "1"]
  - it: should set imagePullPolicy
    set:
      image:
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
  - it: should set envFrom secret
    set:
      envFrom:
        - type: secret
          name: config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: common-test-config
  - it: should set envFrom configMap
    set:
      envFrom:
        - type: configMap
          name: config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: common-test-config
  - it: should set env from secret
    set:
      env:
        CONFIG_FILE:
          type: secret
          name: config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONFIG_FILE
            valueFrom:
              secretKeyRef:
                key: CONFIG_FILE
                name: common-test-config
  - it: should set env from configMap
    set:
      env:
        CONFIG_FILE:
          type: configMap
          name: config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONFIG_FILE
            valueFrom:
              configMapKeyRef:
                key: CONFIG_FILE
                name: common-test-config
  - it: should set env
    set:
      env:
        TZ: America/Los_Angeles
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: America/Los_Angeles
  - it: should set command
    set:
      command:
        - /bin/sleep
        - infinity
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - /bin/sleep
            - infinity
  - it: should set args
    set:
      args:
        - /bin/sleep
        - infinity
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - /bin/sleep
            - infinity
