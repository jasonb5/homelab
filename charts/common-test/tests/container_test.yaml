suite: test container
templates:
  - app.yaml
tests:
  - it: should work
    release:
      name: sample
      namespace: default
    chart:
      version: 0.1.0
      appVersion: 0.1.0
    asserts:
      - equal:
          path: spec.template.spec
          value:
            containers:
            - name: common-test
              image: ubuntu:20.04
  - it: should customize
    documentIndex: 0
    set:
      args:
        - infinity
      command:
        - /bin/sleep
      image:
        repository: custom
        tag: latest
        pullPolicy: Always
      env:
        TZ: America/Los_Angeles
        CONFIG:
          type: configMap
          key: CONFIG
          name: config
        PASSWORD:
          type: secret
          key: PASSWORD
          name: credentials
      envFrom:
        - type: configMap
          name: config
        - type: secret
          name: credentials
      livenessProbe:
        exec:
          command: echo "I am live"
      services:
        http:
          port: 80  
          hostPort: 80
          protocol: TCP
      readinessProbe:
        exec:
          command: echo "I am ready"
      resources:
        requests:
          cpu: 1
      securityContext:
        fsGroup: 567
      persistence:
        config:
          type: configMap
          name: config
          mountPath: /config
          readOnly: true
          subPath: test
    asserts:
      - equal:
          path: spec.template.spec.containers[0]
          value:
            args:
              - infinity
            command:
              - /bin/sleep
            env:
            - name: CONFIG
              valueFrom:
                configMapKeyRef:
                  key: CONFIG
                  name: config
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  key: PASSWORD
                  name: credentials
            - name: TZ
              value: America/Los_Angeles
            envFrom:
            - configMapRef:
                name: config
            - secretRef:
                name: credentials
            name: common-test
            image: custom:latest
            imagePullPolicy: Always
            livenessProbe:
              exec:
                command: echo "I am live"
            ports:
            - containerPort: 80
              hostPort: 80
              name: http
              protocol: TCP
            readinessProbe:
              exec:
                command: echo "I am ready"
            resources:
              requests:
                cpu: 1
            securityContext:
              fsGroup: 567
            volumeMounts:
              - mountPath: /config
                name: config
                readOnly: true
                subPath: test
