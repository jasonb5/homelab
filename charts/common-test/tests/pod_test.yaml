templates:
  - app.yaml
tests:
  - it: should set affinity
    set:
      affinity:
       nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
              - antarctica-east1
              - antarctica-west1
    asserts:
      - isSubset:
          path: spec.template.spec.affinity
          content:
            nodeAffinity:
             requiredDuringSchedulingIgnoredDuringExecution:
               nodeSelectorTerms:
               - matchExpressions:
                 - key: topology.kubernetes.io/zone
                   operator: In
                   values:
                   - antarctica-east1
                   - antarctica-west1
  - it: should set dnsConfig
    set:
      dnsConfig:
        options:
          - name: ndots
            value: 2
    asserts:
      - isSubset:
          path: spec.template.spec.dnsConfig
          content:
            options:
              - name: ndots
                value: 2
  - it: should set dnsPolicy
    set:
      dnsPolicy: ClusterFirst
    asserts:
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirst
  - it: should set hostNetwork
    set:
      hostNetwork: true
    asserts:
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
  - it: should set initContainer
    set:
      initContainers:
        fix-permission:
          image:
            repository: busybox
            tag: latest
    asserts: 
      - contains:
          path: spec.template.spec.initContainers
          content:
            image: busybox:latest
            name: fix-permission
  - it: should set nodeName
    set:
      nodeName: server
    asserts:
      - equal:
          path: spec.template.spec.nodeName
          value: server
  - it: should set nodeSelector
    set:
      nodeSelector:
        gpu: nvidia
    asserts:
      - isSubset:
          path: spec.template.spec.nodeSelector
          content:
            gpu: nvidia
  - it: should set runtimeClassName
    set:
      runtimeClassName: nvidia
    asserts:
      - equal:
          path: spec.template.spec.runtimeClassName
          value: nvidia
  - it: should set securityContext
    set:
      podSecurityContext:
        fsGroup: 101
    asserts:
      - equal:
          path: spec.template.spec.securityContext
          value:
            fsGroup: 101
  - it: should set serviceAccountName
    set:
      serviceAccountName: admin
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: admin
  - it: should set tolerations
    set:
      tolerations:
        - key: "key1"
          operator: "Exists"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "key1"
            operator: "Exists"
            effect: "NoSchedule"
  - it: should set secret volume name
    set:
      persistence:
        config:
          enabled: true
          type: secret
          name: custom
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: common-test-custom
  - it: should set secret volume
    set:
      persistence:
        config:
          enabled: true
          type: secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: common-test-config
  #- it: should set persistentVolumeClaim volume
  #  set:
  #    persistence:
  #      config:
  #        type: pvc
  #  asserts:
  #    - contains:
  #        path: spec.template.spec.volumes
  #        content:
  #          name: config
  #          persistentVolumeClaim:
  #            claimName: common-test-config
  - it: should set nfs volume
    set:
      persistence:
        config:
          enabled: true
          type: nfs
          server: 192.168.1.1
          path: /data
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            nfs:
              path: /data
              readOnly: true
              server: "192.168.1.1"
  - it: should set hostPath volume
    set:
      persistence:
        config:
          enabled: true
          type: hostPath
          path: /data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            hostPath:
              path: /data
  - it: should set emptyDir volume
    set:
      persistence:
        config:
          enabled: true
          type: emptyDir
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            emptyDir:
  - it: should set configMap volume
    set:
      persistence:
        config:
          enabled: true
          type: configMap
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: common-test-config
  - it: should set configMap volume name
    set:
      persistence:
        config:
          enabled: true
          type: configMap
          name: custom
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: common-test-custom
