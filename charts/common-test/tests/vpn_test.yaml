suite: test vpn sidecar
templates:
  - app.yaml
tests:
  - it: should set vpn sidecar
    set:
      sidecars:
        vpn:
          enabled: true
          auth: |
            username
            password
          configFile: |
            vpn config
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Deployment
        documentIndex: 0
      - isKind:
          of: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: common-test-vpn
        documentIndex: 1
      - equal:
          path: data
          value:
            vpn.auth: dXNlcm5hbWUKcGFzc3dvcmQK
            vpn.conf: dnBuIGNvbmZpZwo=
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: null
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            mountPath: /vpn/vpn.auth
            name: vpn-auth
            subPath: vpn.auth
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            mountPath: /vpn/vpn.conf
            name: vpn-config
            subPath: vpn.conf
        documentIndex: 0
      - contains:
          path: spec.template.spec.volumes
          content:
            name: vpn-auth
            secret:
              secretName: common-test-vpn
        documentIndex: 0
      - contains:
          path: spec.template.spec.volumes
          content:
            name: vpn-config
            secret:
              secretName: common-test-vpn
        documentIndex: 0
